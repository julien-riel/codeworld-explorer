name: CI

on:
  push:
  pull_request:

jobs:
  ci:
    name: ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Installer pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Installer Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Installer les dépendances
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Tests
        run: pnpm test

      - name: Build
        run: pnpm build

      # Régression FR-026 : le corpus committé doit se régénérer octet pour octet
      # (plan §6 « le corpus de test se régénère sans erreur en CI »).
      - name: Corpus (régression FR-026)
        run: pnpm corpus:check
